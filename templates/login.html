<!DOCTYPE html>
<html>
<head>
    <title>SaaS Control | Login</title>
    <style>
        body { background: #0b0f19; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0;}
        .card { background: #161e31; padding: 40px; border-radius: 12px; box-shadow: 0 0 30px #00f2fe44; width:300px; text-align:center;}
        input { width: 100%; margin-bottom: 20px; padding: 12px; background: #0b0f19; border: 1px solid #4facfe; color:#fff; border-radius:6px; box-sizing:border-box;}
        button { background: linear-gradient(to right, #00f2fe, #4facfe); border:none; padding:12px; color:#fff; border-radius:6px; font-weight:bold; width:100%; cursor:pointer; transition:0.3s;}
        button:hover { box-shadow: 0 0 15px #00f2fe;}
    </style>
</head>
<body>
    <form class="card" method="POST">
        <h2>System Entry</h2>
        <input type="text" name="user" placeholder="Admin Username" required>
        <input type="password" name="pass" placeholder="Master Key" required>
        <button type="submit">ACCESS PANEL</button>
    </form>
</body>
</html>

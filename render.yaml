services:
  - type: web
    name: tg-bot-saas
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn run:app -b 0.0.0.0:$PORT"
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_URL
        value: "https://tg-bot-saas.onrender.com"
